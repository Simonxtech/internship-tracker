<!--
  =============================================================
   applications.html — Bewerbungsübersicht (Tabelle)
  =============================================================

   Zeigt alle Bewerbungen des Users in einer Tabelle.
   Features:
     - Suche nach Company, Position, Location
     - Filter nach Status und Typ
     - Buttons zum Erstellen, Bearbeiten, Löschen
     - Sortierbare Spalten

   Nutzt applications.js für die Frontend-Logik.
  =============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Buddy — Applications</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/img/logo.png">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar" id="navbar"></nav>

    <!-- Seiteninhalt -->
    <div class="page-container">

        <!-- Seiten-Header mit "Add New" Button -->
        <div class="page-header" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
            <div>
                <h1 class="page-title">Applications</h1>
                <p class="page-subtitle">Manage all your internship and working student applications.</p>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary" onclick="openTagsModal()">Manage Tags</button>
                <a href="/application-form.html" class="btn btn-primary">+ Add Application</a>
            </div>
        </div>

        <!-- Manage Tags Modal -->
        <div id="tagsModalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center;">
            <!-- Fester weißer Hintergrund damit man den Content dahinter nicht sieht -->
            <div style="background:var(--surface); border-radius:12px; padding:24px; width:440px; max-width:95vw; max-height:80vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
                    <h2 style="font-size:18px; font-weight:600; margin:0;">Manage Tags</h2>
                    <button onclick="closeTagsModal()" style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-light); line-height:1;">&times;</button>
                </div>

                <!-- Bestehende Tags -->
                <div id="tagsModalList" style="margin-bottom:20px;"></div>

                <!-- Neuen Tag erstellen -->
                <div style="border-top:1px solid var(--border); padding-top:16px;">
                    <div style="font-size:13px; font-weight:600; margin-bottom:10px;">Add New Tag</div>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <input type="text" id="newTagName" placeholder="Tag name" style="flex:1; padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; background:var(--input-bg); color:var(--text);">
                        <input type="color" id="newTagColor" value="#3b82f6" style="width:38px; height:34px; border:1px solid var(--border); border-radius:6px; cursor:pointer; padding:2px;">
                        <button class="btn btn-primary btn-sm" onclick="createTag()" style="white-space:nowrap;">Add Tag</button>
                    </div>
                    <div id="tagsModalError" style="font-size:12px; color:#dc2626; margin-top:6px; display:none;"></div>
                </div>
            </div>
        </div>

        <!-- Filter-Leiste -->
        <div class="filters-bar">
            <input
                type="text"
                class="search-input"
                id="searchInput"
                placeholder="Search company, position..."
                oninput="applyFilters()"
            >
            <select class="filter-select" id="filterStatus" onchange="applyFilters()">
                <option value="">All Statuses</option>
                <option value="Wishlist">Wishlist</option>
                <option value="Applied">Applied</option>
                <option value="Online Assessment">Online Assessment</option>
                <option value="Interview">Interview</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
            </select>
            <select class="filter-select" id="filterType" onchange="applyFilters()">
                <option value="">All Types</option>
                <option value="Internship">Internship</option>
                <option value="Working Student">Working Student</option>
            </select>
            <!-- Location-Filter: wird von JavaScript befüllt -->
            <select class="filter-select" id="filterLocation" onchange="applyFilters()">
                <option value="">All Locations</option>
            </select>
            <!-- Tag/Period-Filter: wird von JavaScript befüllt -->
            <select class="filter-select" id="filterTag" onchange="applyFilters()">
                <option value="">All Tags</option>
            </select>
            <!-- Salary-Filter: Min und Max -->
            <input
                type="number"
                class="filter-select"
                id="filterSalaryMin"
                placeholder="Min €"
                min="0"
                max="20000"
                step="50"
                style="width:90px"
                oninput="applyFilters()"
            >
            <input
                type="number"
                class="filter-select"
                id="filterSalaryMax"
                placeholder="Max €"
                min="0"
                max="20000"
                step="50"
                style="width:90px"
                oninput="applyFilters()"
            >
        </div>

        <!-- Urgent Deadlines Banner -->
        <div id="urgentBanner" style="display:none; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:13px; line-height:1.7;">
            <div id="urgentBannerContent"></div>
        </div>

        <!-- Tabelle -->
        <div class="table-wrap">
            <div class="table-scroll">
                <table id="applicationsTable">
                    <thead>
                        <tr>
                            <th class="col-company" style="cursor:pointer" onclick="sortByColumn('company')">Company ↕</th>
                            <th style="cursor:pointer" onclick="sortByColumn('roleType')">Type ↕</th>
                            <th class="col-position" style="cursor:pointer" onclick="sortByColumn('position')">Position ↕</th>
                            <th class="col-location">Location</th>
                            <th style="cursor:pointer" onclick="sortByColumn('status')">Status ↕</th>
                            <th class="col-tags">Tags</th>
                            <th class="col-deadline" style="cursor:pointer" onclick="sortByColumn('deadline')">Deadline ↕</th>
                            <th class="col-salary">Salary (€/mo)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Wird von JavaScript befüllt -->
                    </tbody>
                </table>
            </div>

            <!-- Leerer Zustand -->
            <div class="empty-state" id="emptyState" style="display:none">
                <p>No applications found.</p>
                <p style="margin-top:8px">
                    <a href="/application-form.html" class="btn btn-primary btn-sm">+ Add your first application</a>
                </p>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- JavaScript -->
    <script src="/js/navigation.js"></script>
    <script src="/js/applications.js"></script>

</body>
</html>
