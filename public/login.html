<!--
  =============================================================
   login.html — Login- und Registrierungsseite
  =============================================================

   Dies ist die erste Seite die man sieht.
   Hier kann man sich einloggen oder einen neuen Account erstellen.

   Hat KEINE Navigation — die kommt erst nach dem Login.
   Nutzt login.js für die Frontend-Logik.
  =============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Buddy — Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/img/logo.png">
</head>
<body>

    <!-- Gesamte Login-Seite -->
    <div class="auth-page">
        <div class="auth-card">

            <!-- Logo und Titel -->
            <div class="auth-logo">
                <img src="/img/logo.png" alt="Intern Buddy" style="height:40px;">
                <div>
                    <div class="auth-title">Intern Buddy</div>
                    <div class="auth-subtitle">Track your internship &amp; working student applications</div>
                </div>
            </div>

            <!-- Tabs: Login / Register -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" onclick="showTab('login')">Login</button>
                <button class="auth-tab" id="tabRegister" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login-Formular -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" required placeholder="Your username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <div id="loginError" class="auth-error"></div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:10px; margin-top:8px" id="loginButton">
                    Login
                </button>
            </form>

            <!-- Registrierungs-Formular (anfangs versteckt) -->
            <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="registerUsername" required placeholder="Choose a username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" required placeholder="At least 4 characters" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="registerPasswordConfirm" required placeholder="Repeat password" autocomplete="new-password">
                </div>
                <div id="registerError" class="auth-error"></div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:10px; margin-top:8px" id="registerButton">
                    Create Account
                </button>
            </form>

            <div style="font-size:11px; color:var(--text-light); text-align:center; margin-top:16px">
                Your data is stored securely on the server.
            </div>

        </div>
    </div>

    <!-- JavaScript für die Login-Logik -->
    <script src="/js/login.js"></script>

</body>
</html>
